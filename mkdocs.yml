site_name: Вероятности СУ
site_url: https://fmi-stochastics.github.io/
use_directory_urls: true

nav:
  - Начало: index.md
  - Вероятности и статистика:
      - Компютърни науки, поток 2: prob-stat/computer-science-2.md
      - Софтуерно инженерство: prob-stat/software-engineering.md
      - Приложна математика: prob-stat/applied-math.md

repo_url: https://github.com/fmi-stochastics/fmi-stochastics.github.io
repo_name: fmi-stochastics.github.io

theme:
  name: material
  language: bg
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  palette:
    scheme: default
    primary: indigo
    accent: amber
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences

extra_css:
  - assets/stylesheets/custom.css

extra:
  generator: false
